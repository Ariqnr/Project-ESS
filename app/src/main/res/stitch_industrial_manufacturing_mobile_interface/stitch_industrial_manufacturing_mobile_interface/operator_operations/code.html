<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .industrial-shadow {
            box-shadow: 0px 4px 12px rgba(28, 43, 58, 0.12);
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background antialiased min-h-screen pb-24 flex flex-col items-center">
<!-- TopAppBar -->
<header class="bg-primary dark:bg-primary-container text-on-primary dark:text-on-primary-container w-full top-0 shadow-[0px_4px_12px_rgba(28,43,58,0.12)] flex justify-between items-center px-margin-mobile h-14 z-50 sticky">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-primary">factory</span>
<h1 class="text-headline-sm font-headline-sm font-bold tracking-tight text-on-primary">INDUSTRIAL OS</h1>
</div>
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-surface-variant overflow-hidden border border-outline-variant flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-sm">person</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-4xl px-margin-mobile pt-8 pb-8 flex-grow">
<div class="mb-8 flex justify-between items-end">
<div>
<p class="font-label-md text-label-md text-tertiary-fixed-dim uppercase tracking-wider mb-1">Shift 1 - Line B</p>
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary">Operations Menu</h2>
</div>
<div class="hidden md:flex gap-2">
<span class="inline-flex items-center gap-1 bg-surface-container-highest px-3 py-1 rounded-full font-label-md text-label-md text-on-surface-variant">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
                    System Online
                </span>
</div>
</div>
<!-- Bento Grid Layout for Operator Actions -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Mengelola Penerimaan Barang -->
<button class="group text-left bg-surface rounded-lg industrial-shadow relative overflow-hidden border-t-2 border-tertiary-fixed-dim transition-all hover:translate-y-[-2px] hover:shadow-[0px_8px_16px_rgba(28,43,58,0.16)] focus:outline-none focus:ring-2 focus:ring-[#073A40] focus:ring-offset-2 flex flex-col min-h-[160px] p-6 justify-between">
<div class="flex justify-between items-start w-full mb-4">
<div class="p-3 bg-primary-container rounded-lg group-hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-on-primary text-3xl">barcode_scanner</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">arrow_forward</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-primary mb-1">Mengelola Penerimaan Barang</h3>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">Scan incoming materials, verify manifests, and log inventory to warehouse zones.</p>
</div>
<!-- Interactive Target Hint -->
<div class="absolute inset-0 bg-secondary/5 opacity-0 group-active:opacity-100 transition-opacity pointer-events-none"></div>
</button>
<!-- Melakukan Perakitan Barang -->
<button class="group text-left bg-surface rounded-lg industrial-shadow relative overflow-hidden border-t-2 border-tertiary-fixed-dim transition-all hover:translate-y-[-2px] hover:shadow-[0px_8px_16px_rgba(28,43,58,0.16)] focus:outline-none focus:ring-2 focus:ring-[#073A40] focus:ring-offset-2 flex flex-col min-h-[160px] p-6 justify-between">
<div class="flex justify-between items-start w-full mb-4">
<div class="p-3 bg-primary-container rounded-lg group-hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-on-primary text-3xl">construction</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">arrow_forward</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-primary mb-1">Melakukan Perakitan Barang</h3>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">Access assembly schematics, log component usage, and track sub-assembly progress.</p>
</div>
<div class="absolute inset-0 bg-secondary/5 opacity-0 group-active:opacity-100 transition-opacity pointer-events-none"></div>
</button>
<!-- Menguji Barang -->
<button class="group text-left bg-surface rounded-lg industrial-shadow relative overflow-hidden border-t-2 border-tertiary-fixed-dim transition-all hover:translate-y-[-2px] hover:shadow-[0px_8px_16px_rgba(28,43,58,0.16)] focus:outline-none focus:ring-2 focus:ring-[#073A40] focus:ring-offset-2 flex flex-col min-h-[160px] p-6 justify-between">
<div class="flex justify-between items-start w-full mb-4">
<div class="p-3 bg-primary-container rounded-lg group-hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-on-primary text-3xl">fact_check</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">arrow_forward</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-primary mb-1">Menguji Barang</h3>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">Execute quality control protocols, record test metrics, and flag defects.</p>
</div>
<div class="absolute inset-0 bg-secondary/5 opacity-0 group-active:opacity-100 transition-opacity pointer-events-none"></div>
</button>
<!-- Melakukan Packing Barang -->
<button class="group text-left bg-surface rounded-lg industrial-shadow relative overflow-hidden border-t-2 border-tertiary-fixed-dim transition-all hover:translate-y-[-2px] hover:shadow-[0px_8px_16px_rgba(28,43,58,0.16)] focus:outline-none focus:ring-2 focus:ring-[#073A40] focus:ring-offset-2 flex flex-col min-h-[160px] p-6 justify-between">
<div class="flex justify-between items-start w-full mb-4">
<div class="p-3 bg-primary-container rounded-lg group-hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-on-primary text-3xl">inventory_2</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">arrow_forward</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-primary mb-1">Melakukan Packing Barang</h3>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">Generate shipping labels, finalize package weight, and stage for dispatch.</p>
</div>
<div class="absolute inset-0 bg-secondary/5 opacity-0 group-active:opacity-100 transition-opacity pointer-events-none"></div>
</button>
</div>

<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-container-high transition-all focus:outline-none min-h-[48px] min-w-[48px]">
<span class="material-symbols-outlined mb-1">dashboard</span>
