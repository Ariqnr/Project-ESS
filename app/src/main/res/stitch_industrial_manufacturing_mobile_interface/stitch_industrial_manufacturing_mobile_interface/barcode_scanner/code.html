<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Scan Barcode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Work+Sans:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#dbc3a6",
                        "on-primary": "#ffffff",
                        "on-background": "#1b1c1d",
                        "on-secondary-container": "#406b71",
                        "surface-dim": "#dbd9db",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#f2f0f1",
                        "background": "#fbf9fa",
                        "on-surface-variant": "#44474c",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#261907",
                        "surface-variant": "#e4e2e3",
                        "on-tertiary-container": "#a38d74",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#eae7e9",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#bdeaf2",
                        "primary": "#061625",
                        "secondary-container": "#bdeaf2",
                        "on-primary-fixed": "#0d1d2b",
                        "inverse-primary": "#b8c8dc",
                        "secondary-fixed-dim": "#a2ced5",
                        "surface": "#fbf9fa",
                        "primary-fixed": "#d4e4f8",
                        "surface-container": "#efedee",
                        "on-error": "#ffffff",
                        "secondary": "#3a656b",
                        "inverse-surface": "#303032",
                        "on-primary-fixed-variant": "#394858",
                        "outline-variant": "#c4c6cc",
                        "surface-bright": "#fbf9fa",
                        "on-secondary-fixed-variant": "#204d53",
                        "on-primary-container": "#8392a5",
                        "tertiary-fixed": "#f8dec1",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#516071",
                        "on-tertiary-fixed-variant": "#55442e",
                        "surface-container-low": "#f5f3f4",
                        "on-surface": "#1b1c1d",
                        "outline": "#74777c",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#001f23",
                        "primary-fixed-dim": "#b8c8dc",
                        "primary-container": "#1c2b3a",
                        "tertiary": "#1f1303",
                        "surface-container-highest": "#e4e2e3",
                        "tertiary-container": "#362714",
                        "industrial-teal": "#073A40",
                        "industrial-gold": "#A69076",
                        "industrial-gray": "#A69F97"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "component-padding-x": "16px",
                        "margin-tablet": "24px",
                        "base": "4px",
                        "gutter": "16px",
                        "component-padding-y": "12px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "label-md": ["JetBrains Mono"],
                        "body-md": ["Work Sans"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "body-lg": ["Work Sans"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .scan-overlay {
            background: radial-gradient(circle at center, transparent 30%, rgba(28, 43, 58, 0.8) 100%);
        }
        .reticle-corner {
            width: 32px;
            height: 32px;
            border-color: #073A40;
            border-width: 4px;
            position: absolute;
        }
        .reticle-tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .reticle-tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .reticle-bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .reticle-br { bottom: 0; right: 0; border-left: none; border-top: none; }
        
        /* Ambient Navy Shadow for industrial feel */
        .shadow-industrial {
            box-shadow: 0px 4px 12px rgba(28, 43, 58, 0.12);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="bg-primary dark:bg-primary-container text-on-primary dark:text-on-primary-container shadow-[0px_4px_12px_rgba(28,43,58,0.12)] sticky top-0 z-50">
<div class="flex justify-between items-center w-full px-margin-mobile h-14">
<button aria-label="Back" class="flex items-center justify-center p-2 rounded-full hover:bg-primary-container transition-colors duration-200">
<span class="material-symbols-outlined text-on-primary">arrow_back</span>
</button>
<div class="text-headline-sm font-headline-sm font-bold tracking-tight text-on-primary text-center flex-1">
                Scan
            </div>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-1 flex flex-col w-full max-w-3xl mx-auto p-margin-mobile gap-6">
<!-- Camera Viewfinder -->
<section class="relative w-full aspect-[4/3] md:aspect-video rounded-xl overflow-hidden shadow-industrial bg-black flex items-center justify-center group">
<!-- Simulated Camera Feed via Image -->
<img alt="Industrial warehouse shelf with boxes" class="absolute inset-0 w-full h-full object-cover opacity-70 group-hover:opacity-90 transition-opacity duration-300" data-alt="A close-up view of a cardboard box sitting on an industrial warehouse shelving unit. The box has a large, clearly visible standard barcode label affixed to its side. The lighting is bright and artificial, typical of a modern logistics facility. The camera angle simulates the perspective of a worker holding a handheld scanning device, aiming directly at the barcode." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCKS4YiYx4DipgpWmCe5-FrERbSM6lxlP7UyiYUREeuZ90L2sEQ47_7KZKeWiPJUKzM2FWi0xXlSDjaEbODo9pBcz97RVwKnnCF0CBl4phAlnocHNBjHzQqdX-WSpTL1OlP6CzzUVPSddsSF5XXZ37kWTO8OCRofDnIpuaG7Ez68C__htj_8sI_xNpC1c13ABBKUFntp8Yttmek11Dt3YAdCiZrj5Ug0Nl5d8OOAUNPBdiyRkrnyVsR_GAuUMqw79YzbGVPt3Kbow4"/>
<!-- Scan Overlay Scrim -->
<div class="absolute inset-0 scan-overlay pointer-events-none"></div>
<!-- Teal Reticle -->
<div class="relative w-64 h-32 md:w-80 md:h-40 z-10 pointer-events-none">
<div class="reticle-corner reticle-tl rounded-tl-lg"></div>
<div class="reticle-corner reticle-tr rounded-tr-lg"></div>
<div class="reticle-corner reticle-bl rounded-bl-lg"></div>
<div class="reticle-corner reticle-br rounded-br-lg"></div>
<!-- Scanning Line Animation -->
<div class="absolute w-full h-0.5 bg-industrial-teal opacity-80 shadow-[0_0_8px_#073A40] animate-[scan_2s_ease-in-out_infinite]" style="animation: scanLine 2s ease-in-out infinite;"></div>
</div>
<!-- Floating Flash Button -->
<button class="absolute bottom-4 right-4 bg-primary/80 backdrop-blur-sm text-on-primary p-3 rounded-full hover:bg-primary transition-colors shadow-lg">
<span class="material-symbols-outlined">flashlight_on</span>
</button>
</section>
<!-- Manual Input -->
<section class="bg-surface p-4 rounded-xl shadow-industrial flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="manual-barcode">Manual Entry</label>
<div class="flex gap-2">
<input class="flex-1 bg-surface-container-lowest border border-industrial-gray rounded-lg px-4 py-3 font-label-md text-on-surface focus:outline-none focus:ring-2 focus:ring-industrial-teal focus:border-transparent transition-all" id="manual-barcode" placeholder="Enter barcode ID..." type="text"/>
<button class="bg-primary hover:bg-primary-container text-on-primary px-6 py-3 rounded-lg font-headline-sm text-sm font-semibold transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-sm">search</span>
                    Lookup
                </button>
</div>
</section>
<!-- Recent Scans List -->
<section class="flex flex-col gap-3 mt-4">
<h2 class="font-headline-sm text-headline-sm text-on-background flex items-center gap-2">
<span class="material-symbols-outlined text-industrial-teal">history</span>
                Recent Scans
            </h2>
<div class="bg-surface rounded-xl shadow-industrial overflow-hidden border-t-[3px] border-industrial-gold">
<!-- List Item 1 -->
<div class="flex items-center justify-between p-4 border-b border-surface-variant hover:bg-surface-container-low transition-colors cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined">inventory_2</span>
</div>
<div>
<div class="font-label-md text-on-background font-bold">PKG-88219-A</div>
<div class="font-body-md text-sm text-on-surface-variant">Logged: 10:42 AM - Sector 4</div>
</div>
</div>
<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full font-label-md">Success</span>
</div>
<!-- List Item 2 -->
<div class="flex items-center justify-between p-4 border-b border-surface-variant hover:bg-surface-container-low transition-colors cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined">inventory_2</span>
</div>
<div>
<div class="font-label-md text-on-background font-bold">BIN-402-XX</div>
<div class="font-body-md text-sm text-on-surface-variant">Logged: 09:15 AM - Sector 1</div>
</div>
</div>
<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full font-label-md">Success</span>
</div>
<!-- List Item 3 (Error state) -->
<div class="flex items-center justify-between p-4 hover:bg-surface-container-low transition-colors cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-error-container text-on-error-container flex items-center justify-center">
<span class="material-symbols-outlined">warning</span>
</div>
<div>
<div class="font-label-md text-on-background font-bold">UNKNOWN-TAG</div>
<div class="font-body-md text-sm text-on-surface-variant">Logged: 08:30 AM - Sector 4</div>
</div>
</div>
<span class="bg-error text-on-error text-xs px-2 py-1 rounded-full font-label-md">Failed</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar (Hidden on md and up as per instructions, but included for mobile context) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 pb-safe bg-surface dark:bg-surface-container-lowest border-t border-outline-variant shadow-[0px_-4px_12px_rgba(28,43,58,0.08)] rounded-t-xl md:hidden">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-md text-label-md mt-1">Dashboard</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">precision_manufacturing</span>
<span class="font-label-md text-label-md mt-1">Operations</span>
</button>
<button class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-2xl px-5 py-1 scale-90 duration-150 ease-in-out">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">barcode_scanner</span>
<span class="font-label-md text-label-md mt-1">Scan</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">monitoring</span>
<span class="font-label-md text-label-md mt-1">Supervisor</span>
</button>
</nav>
<style>
        @keyframes scanLine {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
    </style>
</body></html>
