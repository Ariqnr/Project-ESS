<body class="font-body-md text-on-surface antialiased min-h-screen pb-24 md:pb-8 flex flex-col">
<!-- TopAppBar -->
<header class="bg-primary shadow-industrial-header flex justify-between items-center w-full px-margin-mobile h-14 z-50 sticky top-0">
<div class="flex items-center gap-3 text-on-primary">
<span class="material-symbols-outlined">factory</span>
<span class="font-headline-sm text-headline-sm font-bold tracking-tight">INDUSTRIAL OS</span>
</div>
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-surface-variant overflow-hidden flex items-center justify-center text-primary font-label-md font-bold text-xs" data-alt="A professional headshot of a factory supervisor in a modern, clean industrial control room. The lighting is crisp and technical, highlighting a confident expression. The supervisor is wearing a high-visibility vest over a pristine blue collared shirt. The background features blurred, glowing screens displaying technical schematics, conveying a sense of advanced manufacturing.">
                JS
            </div>
</div>
</header>
<main class="flex-grow p-margin-mobile md:p-margin-tablet max-w-4xl mx-auto w-full grid grid-cols-4 md:grid-cols-8 gap-gutter">
<!-- Screen Title -->
<div class="col-span-4 md:col-span-8 mb-4">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface flex items-center gap-3">
<span class="material-symbols-outlined text-[32px] text-primary">fact_check</span>
                Pengujian Barang
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Selesaikan pengujian kualitas untuk batch saat ini.</p>
</div>
<!-- Item Details Card -->
<div class="col-span-4 md:col-span-8 card-surface rounded-lg shadow-industrial-card border-t-4 border-accent-tan p-6 relative overflow-hidden">
<h2 class="font-headline-sm text-headline-sm text-primary mb-4 flex items-center gap-2">
<span class="material-symbols-outlined">inventory_2</span>
                Detail Barang
            </h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="bg-surface-container-low p-4 rounded border border-outline-variant">
<span class="block font-label-md text-label-md text-on-surface-variant uppercase mb-1">Serial No</span>
<span class="font-headline-md text-headline-md text-primary font-mono tracking-wider">SN-8834-A</span>
</div>
<div class="bg-surface-container-low p-4 rounded border border-outline-variant">
<span class="block font-label-md text-label-md text-on-surface-variant uppercase mb-1">Model</span>
<span class="font-headline-md text-headline-md text-primary">VX-2000</span>
</div>
<div class="bg-surface-container-low p-4 rounded border border-outline-variant">
<span class="block font-label-md text-label-md text-on-surface-variant uppercase mb-1">Batch</span>
<span class="font-headline-md text-headline-md text-primary">B-992-10</span>
</div>
</div>
</div>
<!-- Testing Interface -->
<div class="col-span-4 md:col-span-8 card-surface rounded-lg shadow-industrial-card p-6 mt-2">
<h2 class="font-headline-sm text-headline-sm text-primary mb-6 flex items-center gap-2 border-b border-outline-variant pb-2">
<span class="material-symbols-outlined">science</span>
                Hasil Pengujian
            </h2>
<!-- Toggle (Radio Buttons styled as Chips) -->
<div class="mb-8">
<span class="block font-label-md text-label-md text-on-surface-variant uppercase mb-3">Status Evaluasi</span>
<div class="flex flex-col sm:flex-row gap-4">
<label class="relative flex-1 cursor-pointer group">
<input checked="" class="peer sr-only" id="radio-pass" name="test_result" onchange="toggleFailureFields()" type="radio" value="pass"/>
<div class="flex items-center justify-center gap-2 p-4 rounded-full border-2 border-outline-variant bg-surface peer-checked:bg-custom-success-container peer-checked:border-custom-success peer-checked:text-custom-success-on-container hover:bg-surface-container-high transition-colors min-h-[48px]">
<span class="material-symbols-outlined font-bold">check_circle</span>
<span class="font-headline-sm text-headline-sm">LULUS (PASS)</span>
</div>
</label>
<label class="relative flex-1 cursor-pointer group">
<input class="peer sr-only" id="radio-fail" name="test_result" onchange="toggleFailureFields()" type="radio" value="fail"/>
<div class="flex items-center justify-center gap-2 p-4 rounded-full border-2 border-outline-variant bg-surface peer-checked:bg-error-container peer-checked:border-error peer-checked:text-on-error-container hover:bg-surface-container-high transition-colors min-h-[48px]">
<span class="material-symbols-outlined font-bold">cancel</span>
<span class="font-headline-sm text-headline-sm">GAGAL (FAIL)</span>
</div>
</label>
</div>
</div>
<!-- Conditional Failure Fields -->
<div class="hidden space-y-6 opacity-0 transition-opacity duration-300" id="failure-fields">
<div class="relative pt-6">
<label class="absolute top-0 left-2 -mt-2 px-1 bg-[#F2F2F2] font-label-md text-label-md text-neutral-gray uppercase z-10 peer-focus:text-teal-focus" for="failure-notes">
                        Catatan Kegagalan Uji
                    </label>
<textarea class="peer w-full rounded border-neutral-gray bg-transparent px-4 py-3 text-on-surface font-body-md focus:border-teal-focus focus:ring-1 focus:ring-teal-focus focus:outline-none transition-colors placeholder:text-outline-variant min-h-[48px]" id="failure-notes" placeholder="Deskripsikan kerusakan atau anomali..." rows="4"></textarea>
</div>
<div class="flex justify-start">
<button class="flex items-center gap-2 px-6 py-3 rounded-xl border-[1.5px] border-secondary-border text-navy-primary font-label-md text-label-md hover:bg-surface-container-high focus:outline-none focus:border-teal-focus focus:ring-1 focus:ring-teal-focus transition-all min-h-[48px]" type="button">
<span class="material-symbols-outlined">build</span>
                        MEMPERBAIKI BARANG
                    </button>
</div>
</div>
<!-- Form Actions -->
<div class="mt-10 pt-6 border-t border-outline-variant flex justify-end">
<button class="flex items-center justify-center gap-2 bg-navy-primary text-on-primary px-8 py-3 rounded-xl font-label-md text-label-md uppercase tracking-wider shadow-md hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-teal-focus focus:ring-offset-2 transition-all min-w-[200px] min-h-[48px]" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                    SIMPAN HASIL
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 pb-safe bg-surface border-t border-outline-variant shadow-[0px_-4px_12px_rgba(28,43,58,0.08)] rounded-t-xl md:hidden">
<button class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-md text-label-md mt-1">Dashboard</span>
</button>
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-2xl px-5 py-1 scale-90 duration-150 ease-in-out">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">precision_manufacturing</span>
<span class="font-label-md text-label-md mt-1 font-bold">Operations</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">barcode_scanner</span>
<span class="font-label-md text-label-md mt-1">Scan</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">monitoring</span>
<span class="font-label-md text-label-md mt-1">Supervisor</span>
</button>
</nav>
<script>
        function toggleFailureFields() {
            const isFail = document.getElementById('radio-fail').checked;
            const fields = document.getElementById('failure-fields');
            
            if (isFail) {
                fields.classList.remove('hidden');
                // slight delay to allow display:block to apply before animating opacity
                setTimeout(() => {
                    fields.classList.remove('opacity-0');
                    fields.classList.add('opacity-100');
                }, 10);
            } else {
                fields.classList.remove('opacity-100');
                fields.classList.add('opacity-0');
                setTimeout(() => {
                    fields.classList.add('hidden');
                }, 300); // match duration
            }
        }
        
        // Ensure correct state on load
        document.addEventListener('DOMContentLoaded', toggleFailureFields);
    </script>
</body></html>
